    <!-- Two thick angled bars forming a right-opening V / checkmark -->
    <path d="M38 108 L72 148 L100 120 L128 148 L162 108 L128 72 L100 100 L72 72 Z" fill="#C5006A"/>
    <!-- Clean V shape -->
    <path d="M44 96 L100 158 L156 96 L140 80 L100 126 L60 80 Z" fill="#C5006A"/>
  </g>

  <!-- White person head circle -->
  <circle cx="100" cy="68" r="24" fill="white"/>
