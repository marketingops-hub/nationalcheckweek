<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <clipPath id="pin-clip">
      <path d="M100 4 C55 4 18 41 18 86 C18 115 32 138 52 158 L100 212 L148 158 C168 138 182 115 182 86 C182 41 145 4 100 4 Z"/>
    </clipPath>
  </defs>

  <!-- Full pin in blue -->
  <path d="M100 4 C55 4 18 41 18 86 C18 115 32 138 52 158 L100 212 L148 158 C168 138 182 115 182 86 C182 41 145 4 100 4 Z" fill="#29ABE2"/>

  <!-- Pink chevron/checkmark — clipped to pin shape -->
